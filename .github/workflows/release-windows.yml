name: Build Windows .exe

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:        # also runnable manually from the Actions tab

permissions:
  contents: write           # needed to upload the .exe to the matching release

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~\AppData\Local\pip\Cache
          key: pip-${{ runner.os }}-${{ hashFiles('windows/requirements.txt') }}

      - name: Install Python deps
        working-directory: windows
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Fetch bundled binaries (yt-dlp, ffmpeg, ffprobe)
        working-directory: windows
        shell: pwsh
        run: ./fetch-binaries.ps1

      - name: Build .exe with PyInstaller
        working-directory: windows
        run: pyinstaller --clean youtube-downloader.spec

      - name: Install Inno Setup
        run: choco install innosetup --no-progress -y
        shell: pwsh

      - name: Build Setup installer
        working-directory: windows
        run: |
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" installer.iss

      - name: Show build output
        working-directory: windows
        run: |
          dir dist
          dir Output

      - name: Upload artifacts (always)
        uses: actions/upload-artifact@v4
        with:
          name: YouTubeDownloader-windows
          path: |
            windows/dist/YouTubeDownloader.exe
            windows/Output/YouTubeDownloader-Setup.exe

      - name: Attach to GitHub Release (only on tag pushes)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            windows/dist/YouTubeDownloader.exe
            windows/Output/YouTubeDownloader-Setup.exe
          fail_on_unmatched_files: true
